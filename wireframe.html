<!DOCTYPE html>
<html>
<head>
    <title>Mind at Ease Wireframe</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .container {
            position: relative;
            width: 600px;
            height: 600px;
            margin: auto;
        }

        .box {
            position: absolute;
            width: 120px;
            height: 80px;
            border: 2px solid black;
            line-height: 80px;
            font-weight: bold;
            background-color: #f5f5f5;
        }

        /* Center */
        .home {
            top: 260px;
            left: 240px;
            background-color: lightblue;
        }

        /* Surrounding pages */
        .mental {
            top: 50px;
            left: 240px;
        }

        .tips {
            top: 260px;
            left: 20px;
        }

        .about {
            top: 260px;
            right: 20px;
        }

        .feedback {
            bottom: 50px;
            left: 240px;
        }

        /* Lines */
        .line {
            position: absolute;
            background-color: black;
        }

        .vertical {
            width: 2px;
            height: 200px;
        }

        .horizontal {
            height: 2px;
            width: 200px;
        }

        .line1 { top: 130px; left: 300px; }
        .line2 { top: 300px; left: 120px; }
        .line3 { top: 300px; right: 120px; }
        .line4 { bottom: 130px; left: 300px; }
    </style>
</head>

<body>

<h2>Mind at Ease Web Structure</h2>

<div class="container">

    <!-- Boxes -->
    <div class="box home">Home</div>
    <div class="box mental">Mental Health</div>
    <div class="box tips">Tips</div>
    <div class="box about">About</div>
    <div class="box feedback">Feedback</div>

    <!-- Lines -->
    <div class="line vertical line1"></div>
    <div class="line horizontal line2"></div>
    <div class="line horizontal line3"></div>
    <div class="line vertical line4"></div>

</div>

</body>
</html>
